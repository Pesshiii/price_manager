
<div class="modal-header">
  <h5 class="modal-title fw-semibold">
    <i class="bi bi-plus-circle me-2 text-primary"></i>Новая наценка
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
</div>
<form method="post"
      hx-post="{% url "pricemanager-create" supplier.pk %}"
      hx-target="#modal-container .modal-content"
      hx-swap="innerHTML"
      enctype="multipart/form-data">
  {% csrf_token %}
  <div class="modal-body">
    {% if form.non_field_errors %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {% for error in form.non_field_errors %}
          <div><i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}</div>
        {% endfor %}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endif %}
    {% include "price_manager/partials/pricemanager_form.html" with form=form %}
  </div>
  <div class="modal-footer gap-2">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
      Отмена
    </button>
    <button type="submit" class="btn btn-primary px-4">
      <i class="bi bi-check-lg me-1"></i>Добавить
    </button>
  </div>
</form>
