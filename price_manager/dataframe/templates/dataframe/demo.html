{% extends 'base.html' %}
{% block title %}Демо: файл → CSV{% endblock %}

{% block body %}
<div class="container py-4">
  <h3>Конвертация файла в CSV</h3>
  <p class="text-muted">Выберите сохранённый Dataframe и загрузите файл. Получите CSV с применёнными трансформациями.</p>

  <form id="convert-form" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Dataframe</label>
      {{ form.dataframe }}
    </div>
    <div class="mb-3">
      <label class="form-label">Файл</label>
      {{ form.file }}
    </div>
    <button type="submit" class="btn btn-primary" id="convert-btn">
      <i class="bi bi-download"></i> Скачать CSV
    </button>
    <a href="{% url 'dataframe:list' %}" class="btn btn-link">К списку</a>
  </form>
</div>

<script>
  document.getElementById('convert-form').addEventListener('submit', function(e){
    const select = this.querySelector('[name=dataframe]');
    const pk = select.value;
    if (!pk){ e.preventDefault(); alert('Выберите Dataframe'); return; }
    this.action = '/dataframe/' + pk + '/convert-to-csv/';
  });
</script>
{% endblock %}
