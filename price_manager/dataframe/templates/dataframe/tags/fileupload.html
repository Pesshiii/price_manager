{% load static %}
<div class="fileupload-component" data-field-name="{{ field_name }}">
  <div id="fileupload-trigger-{{ field_name }}" class="fileupload-trigger {% if initial_pk %}d-none{% endif %}">
    <button
      type="button"
      class="btn btn-outline-primary"
      data-bs-toggle="modal"
      data-bs-target="#SelectFile"
      hx-get="{% url 'dataframe:filesselect' %}"
      hx-target="#SelectFile .modal-body"
      hx-swap="innerHTML"
    >
      {{ button_text }}
    </button>
  </div>

  <div id="fileupload-hidden-{{ field_name }}" class="fileupload-hidden-input-container">
    {% if initial_pk %}
      <input type="hidden" name="{{ field_name }}" value="{{ initial_pk }}">
    {% endif %}
  </div>
</div>

<script>
  (function() {
    if (window.__fileuploadSelectFileBound) {
      return;
    }
    window.__fileuploadSelectFileBound = true;

    const modalEl = document.getElementById('SelectFile');
    const fileMetaUrlTemplate = "{% url 'dataframe:filesmeta' 0 %}";
    const fileSelectUrl = "{% url 'dataframe:filesselect' %}";
    if (!modalEl) {
      return;
    }

    const ensureSelectedFileUi = () => {
      const activeFieldName = window.__activeFileuploadComponent?.dataset?.fieldName || 'file_pk';
      const container = document.getElementById(`fileupload-hidden-${activeFieldName}`);
      if (!container) {
        return null;
      }

      let row = container.querySelector('.fileupload-selected-file');
      if (!row) {
        row = document.createElement('div');
        row.className = 'd-flex align-items-center gap-2 mt-2 fileupload-selected-file';

        const filenameNode = document.createElement('span');
        filenameNode.className = 'text-muted';
        filenameNode.dataset.fileuploadFilename = '';

        const changeButton = document.createElement('button');
        changeButton.type = 'button';
        changeButton.className = 'btn btn-sm btn-outline-secondary';
        changeButton.setAttribute('data-bs-toggle', 'modal');
        changeButton.setAttribute('data-bs-target', '#SelectFile');
        changeButton.setAttribute('hx-get', fileSelectUrl);
        changeButton.setAttribute('hx-target', '#SelectFile .modal-body');
        changeButton.setAttribute('hx-swap', 'innerHTML');
        changeButton.textContent = 'Изменить';

        row.appendChild(filenameNode);
        row.appendChild(changeButton);
        container.appendChild(row);
      }

      if (window.htmx) {
        window.htmx.process(row);
      }
      return row;
    };

    const updateSelectedFileUI = (filename) => {
      const row = ensureSelectedFileUi();
      if (!row) {
        return;
      }
      const nameEl = row.querySelector('[data-fileupload-filename]');
      if (nameEl) {
        nameEl.textContent = filename || '';
      }
    };

    const updateSheetOptions = (sheets) => {
      const sheetField = document.querySelector('[name="sheet_name"]');
      if (!sheetField || sheetField.tagName !== 'SELECT') {
        return;
      }

      sheetField.innerHTML = '';
      const emptyOption = document.createElement('option');
      emptyOption.value = '';
      emptyOption.textContent = '---------';
      sheetField.appendChild(emptyOption);

      (sheets || []).forEach((sheet) => {
        const option = document.createElement('option');
        option.value = sheet;
        option.textContent = sheet;
        sheetField.appendChild(option);
      });
    };

    const loadFileMetadata = async (filePk) => {
      const metaUrl = fileMetaUrlTemplate.replace('/0/meta/', `/${filePk}/meta/`);
      const response = await fetch(metaUrl, {headers: {'X-Requested-With': 'XMLHttpRequest'}});
      if (!response.ok) {
        throw new Error('meta');
      }

      const metadata = await response.json();
      const nameField = document.querySelector('[name="name"]');
      if (nameField && !nameField.value && metadata.filename) {
        nameField.value = metadata.filename;
      }

      updateSelectedFileUI(metadata.filename || '');
      updateSheetOptions(metadata.sheets || []);
    };

    document.body.addEventListener('htmx:configRequest', (event) => {
      const target = event.target;
      if (!target || !target.closest || !target.closest('#SelectFile')) {
        return;
      }
      event.detail.parameters.field_name = window.__activeFileuploadComponent?.dataset?.fieldName || 'file_pk';
    });

    document.body.addEventListener('htmx:afterSwap', async (event) => {
      const selectedPk = event.detail?.target?.querySelector?.('[data-selected-pk]')?.dataset?.selectedPk;
      if (!selectedPk) {
        return;
      }

      const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl);
      modalInstance.hide();

      try {
        await loadFileMetadata(selectedPk);
        if (window.htmx) {
          const fileField = document.querySelector('[name="file_pk"]');
          if (fileField) {
            window.htmx.trigger(fileField, 'change');
          }
        }
      } catch (_) {}
    });

    const bootstrapInitialState = async () => {
      const fieldName = window.__activeFileuploadComponent?.dataset?.fieldName || 'file_pk';
      const hiddenInput = document.querySelector(`#fileupload-hidden-${fieldName} input[name]`);
      if (!hiddenInput || !hiddenInput.value) {
        return;
      }
      try {
        await loadFileMetadata(hiddenInput.value);
      } catch (_) {}
    };

    document.addEventListener('click', (event) => {
      const component = event.target.closest('.fileupload-component');
      if (!component) {
        return;
      }

      document.querySelectorAll('.fileupload-component.fileupload-active').forEach((item) => item.classList.remove('fileupload-active'));
      component.classList.add('fileupload-active');
      window.__activeFileuploadComponent = component;
    });

    const defaultComponent = document.querySelector('.fileupload-component');
    if (defaultComponent) {
      window.__activeFileuploadComponent = defaultComponent;
    }

    bootstrapInitialState();
  })();
</script>
