{% load crispy_forms_tags %}

<div data-formset-container data-prefix="{{ formset.prefix }}">

  {{ formset.management_form }}

  <div data-form-container>
    {% for form in formset %}
    <div class="card mb-2 link-form-row">
      <div class="card-header d-flex justify-content-between align-items-center py-1">
        <span class="small fw-semibold text-muted">Привязка {{ forloop.counter }}</span>
        <button type="button" class="btn btn-sm btn-outline-danger" data-delete-btn aria-label="Удалить">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
      <div class="card-body py-2">
        {% crispy form %}
      </div>
      <div class="d-none">{{ form.DELETE }}</div>
    </div>
    {% endfor %}
  </div>

  <p class="text-muted fst-italic small mt-2 mb-1" data-empty-state style="display:none;">
    Нет привязок. Добавьте первую.
  </p>

  <button type="button" class="btn btn-outline-success btn-sm mt-2" data-add-btn>
    <i class="bi bi-plus-lg me-1"></i>Добавить привязку
  </button>

  <div data-empty-form style="display:none;" aria-hidden="true">
    <div class="card mb-2 link-form-row">
      <div class="card-header d-flex justify-content-between align-items-center py-1">
        <span class="small fw-semibold text-muted">Привязка</span>
        <button type="button" class="btn btn-sm btn-outline-danger" data-delete-btn aria-label="Удалить">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
      <div class="card-body py-2">
        {% crispy formset.empty_form %}
      </div>
      <div class="d-none">{{ formset.empty_form.DELETE }}</div>
    </div>
  </div>

  <style>
    .link-form-row {
      transition: opacity 0.3s ease, max-height 0.4s ease;
      overflow: hidden;
      max-height: 600px;
    }
    .link-form-row.is-deleting {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0 !important;
      padding: 0 !important;
    }
  </style>

  <script>
  (function () {
    var AUTOCREATE_URL   = "{% url 'dataframe:contenttype-create' %}";
    var MODAL_ID         = 'contenttypeCreateModal';
    var MODAL_CONTENT_ID = 'contenttypeCreateModalContent';

    var wrapper    = document.currentScript.closest('[data-formset-container]');
    var prefix     = wrapper.dataset.prefix;
    var container  = wrapper.querySelector('[data-form-container]');
    var emptyState = wrapper.querySelector('[data-empty-state]');
    var addBtn     = wrapper.querySelector('[data-add-btn]');
    var emptyForm  = wrapper.querySelector('[data-empty-form]');
    var totalInput = wrapper.querySelector('#id_' + prefix + '-TOTAL_FORMS');

    // ---- EMPTY STATE ----
    function syncEmptyState() {
      var visible = container.querySelectorAll('.link-form-row:not(.is-deleting)');
      emptyState.style.display = visible.length === 0 ? '' : 'none';
    }

    // ---- INIT SELECT2 FOR ONE ROW ----
    // base.html loads jQuery/Select2 at the bottom of <body> — no DAL auto-init.
    // We own the full Select2 lifecycle for contenttype selects.
    function initRow(row) {
      var sel = row.querySelector('select[name$="-contenttype"]');
      if (!sel || sel.dataset.ourInit || !window.$) return;
      var autocompleteUrl = sel.dataset.autocompleteLightUrl;
      if (!autocompleteUrl) return;
      sel.dataset.ourInit = '1';

      if ($(sel).data('select2')) { $(sel).select2('destroy'); }
      $(sel).select2({
        ajax: {
          url: autocompleteUrl,
          dataType: 'json',
          delay: 250,
          data: function (params) { return { q: params.term }; },
          processResults: function (data) { return { results: data.results || [] }; },
        },
        placeholder: '---------',
        allowClear: true,
        width: '100%',
      });
    }

    // ---- "+" BUTTON — open modal for the contenttype select in the same row ----
    wrapper.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-ct-create-btn]');
      if (!btn) return;
      var row = btn.closest('.link-form-row');
      var sel = row && row.querySelector('select[name$="-contenttype"]');
      if (!sel) return;
      window._contenttypeTargetSelectName = sel.name;
      openModal('');
    });

    // ---- MODAL OPEN ----
    function openModal(prefillName) {
      var modalContentEl = document.getElementById(MODAL_CONTENT_ID);
      if (!modalContentEl) return;
      modalContentEl.innerHTML =
        '<div class="modal-body text-center py-4">' +
        '<div class="spinner-border text-secondary" role="status"></div></div>';
      bootstrap.Modal.getOrCreateInstance(document.getElementById(MODAL_ID)).show();
      fetch(AUTOCREATE_URL, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(function (r) { return r.text(); })
        .then(function (html) {
          modalContentEl.innerHTML = html;
          if (prefillName) {
            var nameInput = document.getElementById('id_ct_name');
            if (nameInput) nameInput.value = prefillName;
          }
          bindModalSubmit();
        });
    }

    // ---- MODAL SUBMIT ----
    function bindModalSubmit() {
      var submitBtn = document.getElementById('contenttypeCreateSubmit');
      if (!submitBtn) return;
      submitBtn.addEventListener('click', function () {
        var form = document.getElementById('contenttypeCreateForm');
        if (!form) return;
        fetch(AUTOCREATE_URL, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'X-Requested-With': 'XMLHttpRequest' },
        })
          .then(function (r) {
            var ct = r.headers.get('Content-Type') || '';
            if (ct.indexOf('application/json') !== -1) {
              return r.json().then(function (json) {
                injectAndSelect(json.id, json.name);
                bootstrap.Modal.getOrCreateInstance(
                  document.getElementById(MODAL_ID)
                ).hide();
              });
            }
            return r.text().then(function (html) {
              var el = document.getElementById(MODAL_CONTENT_ID);
              if (el) { el.innerHTML = html; bindModalSubmit(); }
            });
          });
      });
    }

    // ---- INJECT CREATED CONTENTTYPE INTO ORIGINATING SELECT2 ----
    function injectAndSelect(id, name) {
      var selectName = window._contenttypeTargetSelectName;
      if (!selectName || !window.$) return;
      var $sel = $('select[name="' + selectName + '"]');
      if (!$sel.length) return;
      if (!$sel.find('option[value="' + id + '"]').length) {
        $sel.append(new Option(name, id, true, true));
      }
      $sel.val(id).trigger('change');
      window._contenttypeTargetSelectName = null;
    }

    // ---- RESET MODAL ON CLOSE ----
    var modalEl = document.getElementById(MODAL_ID);
    if (modalEl) {
      modalEl.addEventListener('hidden.bs.modal', function () {
        var el = document.getElementById(MODAL_CONTENT_ID);
        if (el) {
          el.innerHTML =
            '<div class="modal-body text-center py-4">' +
            '<div class="spinner-border text-secondary" role="status"></div></div>';
        }
        window._contenttypeTargetSelectName = null;
      });
    }

    // ---- DELETE ROW ----
    container.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-delete-btn]');
      if (!btn) return;
      var row = btn.closest('.link-form-row');
      var cb  = row.querySelector('input[name$="-DELETE"]');
      if (cb) cb.checked = true;
      row.classList.add('is-deleting');
      row.addEventListener('transitionend', function () {
        row.style.display = 'none';
        syncEmptyState();
      }, { once: true });
      syncEmptyState();
    });

    // ---- ADD ROW ----
    addBtn.addEventListener('click', function () {
      var count = parseInt(totalInput.value, 10);
      var html  = emptyForm.innerHTML.replace(/__prefix__/g, count);
      container.insertAdjacentHTML('beforeend', html);
      totalInput.value = count + 1;
      syncEmptyState();
      initRow(container.lastElementChild);
    });

    // Prevent Select2 change events from bubbling into the outer HTMX form
    wrapper.addEventListener('change', function (e) { e.stopPropagation(); });

    // ---- INIT ALL EXISTING ROWS ----
    // jQuery/Select2 load at the bottom of <body>, after this inline script runs.
    // On initial load: wait for 'load' event so scripts are available.
    // On HTMX swap (readyState already 'complete'): use setTimeout so the
    // browser finishes injecting the new DOM before we query it.
    syncEmptyState();
    function initAllRows() {
      container.querySelectorAll('.link-form-row').forEach(initRow);
    }
    if (document.readyState === 'complete') {
      setTimeout(initAllRows, 0);
    } else {
      window.addEventListener('load', initAllRows);
    }
  })();
  </script>

</div>
