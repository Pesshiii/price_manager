{% if widget.is_initial %}
<div class="mb-2 d-flex align-items-center gap-2">
  <span class="text-muted small">
    <i class="bi bi-file-earmark-spreadsheet me-1"></i>
    <a href="{{ widget.value.url }}" target="_blank" rel="noopener">{{ widget.value }}</a>
  </span>
  {% if not widget.required %}
  <div class="form-check form-check-inline mb-0">
    <input class="form-check-input"
           type="checkbox"
           name="{{ widget.checkbox_name }}"
           id="{{ widget.checkbox_id }}"
           {% if widget.attrs.disabled %}disabled{% endif %}
           {% if widget.attrs.checked %}checked{% endif %}>
    <label class="form-check-label text-danger small" for="{{ widget.checkbox_id }}">
      {{ widget.clear_checkbox_label }}
    </label>
  </div>
  {% endif %}
</div>
<label class="text-muted small mb-1">{{ widget.input_text }}:</label>
{% endif %}
<div class="input-group">
  <input type="{{ widget.type }}"
         name="{{ widget.name }}"
         class="form-control"
         {% include "django/forms/widgets/attrs.html" %}>
</div>
