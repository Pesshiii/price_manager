{% if widget.is_initial %}
<div class="d-flex align-items-center gap-2 border rounded px-2 py-1 mb-2 bg-body-secondary">
  <i class="bi bi-file-earmark-spreadsheet text-success flex-shrink-0"></i>
  <a href="{{ widget.value.url }}"
     class="text-truncate small text-decoration-none text-body flex-grow-1"
     target="_blank" rel="noopener"
     title="{{ widget.value }}">{{ widget.value.name|default:widget.value }}</a>
  {% if not widget.required %}
  <input type="checkbox"
         name="{{ widget.checkbox_name }}"
         id="{{ widget.checkbox_id }}"
         class="d-none"
         {% if widget.attrs.disabled %}disabled{% endif %}
         {% if widget.attrs.checked %}checked{% endif %}>
  <button type="button"
          class="btn btn-sm btn-link text-danger py-0 px-1 flex-shrink-0"
          title="{{ widget.clear_checkbox_label }}"
          onclick="document.getElementById('{{ widget.checkbox_id }}').checked=true;this.closest('.d-flex').style.display='none';">
    <i class="bi bi-x-lg"></i>
  </button>
  {% endif %}
</div>
{% endif %}
<input type="{{ widget.type }}"
       name="{{ widget.name }}"
       class="form-control"
       {% include "django/forms/widgets/attrs.html" %}>
