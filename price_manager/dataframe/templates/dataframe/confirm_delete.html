{% extends 'base.html' %}
{% block title %}Удаление Dataframe{% endblock %}
{% block body %}
<div class="container py-4">
  <h3>Удалить Dataframe «{{ object.name }}»?</h3>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'dataframe:list' %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
