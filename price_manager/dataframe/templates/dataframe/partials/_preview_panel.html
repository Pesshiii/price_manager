<div class="card sticky-top" style="top:1rem;">
  <div class="card-header py-2"><strong>Превью</strong></div>
  <div class="card-body">
    <form id="preview-form"
          hx-post="{% url 'dataframe:preview' %}"
          hx-encoding="multipart/form-data"
          hx-target="#preview-result"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div class="mb-2">
        <input type="file" name="file" class="form-control form-control-sm" required>
      </div>
      <input type="hidden" name="instructions" id="preview-instructions">
      <input type="hidden" name="up_to" id="preview-up-to">
      <button type="submit" class="btn btn-sm btn-primary">
        <i class="bi bi-eye"></i> Показать превью
      </button>
    </form>
  </div>
  <div id="preview-result" class="px-3 pb-3"></div>
</div>

<script>
  window.dfPreview = function(upTo){
    const form = document.getElementById('preview-form');
    const fileInput = form.querySelector('input[type=file]');
    if (!fileInput.files.length){ alert('Сначала выберите файл для превью.'); return; }
    document.getElementById('preview-instructions').value = JSON.stringify(window.dfGetState());
    document.getElementById('preview-up-to').value = (upTo===undefined||upTo===null) ? '' : String(upTo);
    htmx.trigger(form, 'submit');
  };
  document.getElementById('preview-form').addEventListener('htmx:configRequest', () => {
    document.getElementById('preview-instructions').value = JSON.stringify(window.dfGetState());
  });
</script>
