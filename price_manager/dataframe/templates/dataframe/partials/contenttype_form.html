<div class="modal-header">
  <h5 class="modal-title" id="contenttypeCreateModalLabel">Новый тип контента</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
</div>
<div class="modal-body">
  {% if form.errors %}
  <div class="alert alert-danger py-2">
    {% for field in form %}{% for error in field.errors %}
      <div><strong>{{ field.label }}:</strong> {{ error }}</div>
    {% endfor %}{% endfor %}
    {% for error in form.non_field_errors %}
      <div>{{ error }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <form id="contenttypeCreateForm" method="post" action="{% url 'dataframe:contenttype-create' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label for="id_ct_name" class="form-label">Название</label>
      <input type="text" class="form-control" id="id_ct_name"
             name="name" value="{{ form.name.value|default:'' }}" required>
    </div>
    <div class="mb-3">
      <label for="id_ct_measure" class="form-label">Единица измерения</label>
      <input type="text" class="form-control" id="id_ct_measure"
             name="measure" value="{{ form.measure.value|default:'' }}" required>
    </div>
    <div class="mb-3">
      <label for="id_ct_contenttype" class="form-label">Тип поля</label>
      <select class="form-select" id="id_ct_contenttype" name="contenttype" required>
        <option value="">---------</option>
        <option value="str" {% if form.contenttype.value == 'str' %}selected{% endif %}>Текст</option>
        <option value="int" {% if form.contenttype.value == 'int' %}selected{% endif %}>Целые числа</option>
        <option value="float" {% if form.contenttype.value == 'float' %}selected{% endif %}>Числа с плавающей точкой</option>
        <option value="Decimal" {% if form.contenttype.value == 'Decimal' %}selected{% endif %}>Десятичные числа</option>
      </select>
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
  <button type="button" class="btn btn-primary" id="contenttypeCreateSubmit">Создать</button>
</div>
