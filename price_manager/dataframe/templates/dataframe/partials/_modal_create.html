{# HTMX-loaded modal fragment for creating a Dataframe from any page. #}
<div class="modal fade show" id="dataframeModal" tabindex="-1" style="display:block;background:rgba(0,0,0,.4)">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Новый Dataframe</h5>
        <button type="button" class="btn-close"
                hx-get="{% url 'dataframe:modal-create' %}" hx-target="#dataframeModalHolder" hx-swap="innerHTML"
                onclick="document.getElementById('dataframeModalHolder').innerHTML=''"></button>
      </div>
      <form method="post"
            hx-post="{% url 'dataframe:modal-create' %}"
            hx-target="#dataframeModalHolder"
            hx-swap="innerHTML">
        {% csrf_token %}
        <div class="modal-body">
          {% include 'dataframe/partials/_editor_form.html' %}
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary"
                  onclick="document.getElementById('dataframeModalHolder').innerHTML=''">Отмена</button>
          <button type="submit" class="btn btn-primary">Создать</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script id="registry-data" type="application/json">{{ registry_json|safe }}</script>
<script id="instructions-data" type="application/json">{{ instructions_json|safe }}</script>
<script>
  // Reuse the same wiring as edit.html — re-emit the bootstrap snippet inline.
  // (Kept short for the modal; rebuilds reader/transform selects.)
  (function(){
    const REGISTRY = JSON.parse(document.getElementById('registry-data').textContent);
    let STATE = JSON.parse(document.getElementById('instructions-data').textContent);
    if (!STATE || !STATE.reader) STATE = {reader:{func:'',args:{}}, transforms:[]};

    const readerSelect = document.getElementById('reader-func');
    const readerArgs = document.getElementById('reader-args');
    const stepsList = document.getElementById('steps-list');
    const addStepSelect = document.getElementById('add-step-func');
    const hiddenJson = document.getElementById('id_instructions_json');

    function fieldFor(arg, value){
      const wrap = document.createElement('div'); wrap.className='mb-2';
      const lbl = document.createElement('label'); lbl.className='form-label small mb-1';
      lbl.textContent = arg.label||arg.name; wrap.appendChild(lbl);
      let input;
      if (arg.type==='dict[str,str]'){
        input=document.createElement('textarea'); input.className='form-control form-control-sm'; input.rows=2;
        if (value && typeof value==='object') input.value=Object.entries(value).map(([k,v])=>`${k}=${v}`).join('\n');
        else input.value=value||'';
      } else {
        input=document.createElement('input'); input.className='form-control form-control-sm';
        input.type=(arg.type==='int'||arg.type==='float')?'number':'text';
        input.value=value!==undefined&&value!==null?value:(arg.default??'');
      }
      input.dataset.argName=arg.name; wrap.appendChild(input); return wrap;
    }
    function readArgs(container, spec){
      const o={}; spec.args.forEach(a=>{const el=container.querySelector(`[data-arg-name="${a.name}"]`); if (el) o[a.name]=el.value;}); return o;
    }
    function sync(){
      const rspec=REGISTRY.readers.find(r=>r.name===STATE.reader.func);
      if (rspec) STATE.reader.args=readArgs(readerArgs, rspec);
      Array.from(stepsList.children).forEach((card,idx)=>{
        const step=STATE.transforms[idx]; const spec=REGISTRY.transforms.find(t=>t.name===step.func);
        if (spec) step.args=readArgs(card, spec);
      });
      hiddenJson.value=JSON.stringify(STATE);
    }
    function renderReader(){
      readerArgs.innerHTML=''; STATE.reader.func=readerSelect.value;
      const spec=REGISTRY.readers.find(r=>r.name===STATE.reader.func);
      if (spec) spec.args.forEach(a=>readerArgs.appendChild(fieldFor(a,(STATE.reader.args||{})[a.name])));
      sync();
    }
    function renderSteps(){
      stepsList.innerHTML='';
      STATE.transforms.forEach((step,idx)=>{
        const spec=REGISTRY.transforms.find(t=>t.name===step.func); if (!spec) return;
        const c=document.createElement('div'); c.className='card mb-2';
        c.innerHTML=`<div class="card-header py-1 d-flex justify-content-between align-items-center"><span><strong>${idx+1}.</strong> ${spec.label}</span><button type="button" class="btn btn-sm btn-outline-danger" data-rm="${idx}">&times;</button></div>`;
        const body=document.createElement('div'); body.className='card-body py-2';
        spec.args.forEach(a=>body.appendChild(fieldFor(a,(step.args||{})[a.name])));
        c.appendChild(body); stepsList.appendChild(c);
      });
      stepsList.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{STATE.transforms.splice(parseInt(b.dataset.rm,10),1); renderSteps();}));
    }
    REGISTRY.readers.forEach(r=>{const o=document.createElement('option'); o.value=r.name; o.textContent=r.label; readerSelect.appendChild(o);});
    REGISTRY.transforms.forEach(t=>{const o=document.createElement('option'); o.value=t.name; o.textContent=t.label; addStepSelect.appendChild(o);});
    readerSelect.value=STATE.reader.func||'';
    renderReader(); renderSteps();
    readerSelect.addEventListener('change', renderReader);
    document.getElementById('add-step-btn').addEventListener('click',()=>{
      if (addStepSelect.value){STATE.transforms.push({func:addStepSelect.value,args:{}}); renderSteps();}
    });
    document.addEventListener('input', e=>{if (e.target.dataset&&e.target.dataset.argName) sync();});
  })();
</script>
