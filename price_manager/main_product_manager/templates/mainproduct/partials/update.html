{% load crispy_forms_tags %}
<div class="container p-4">
    <form hx-post="{% url 'mainproduct-update' mainproduct.pk %}" method="POST">

        {{form|crispy}}
        <div class="mt-4">
            <button class="btn btn-success">
                Обновить
            </button>
            <button class="btn btn-error" name="cancel-btn" value="cancel">
                Отмена
            </button>
        </div>
    </form>
</div>
